<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftBud — Lio's Gym Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D0D0F;
  --bg2: #111115;
  --bg3: #16161c;
  --accent: #3B82F6;
  --accent-glow: rgba(59,130,246,0.25);
  --accent-dim: rgba(59,130,246,0.12);
  --text: #f0f0f8;
  --text2: #c4c4de;
  --text3: #9090b0;
  --border: #2a2a3a;
  --success: #10b981;
  --warn: #f59e0b;
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding-bottom:80px}
a{color:inherit;text-decoration:none}

/* ── Header ── */
.app-header{padding:28px 20px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0f18 0%,transparent 100%)}
.app-header .inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{font-size:26px;font-weight:900;letter-spacing:-0.5px}
.logo .hi{color:var(--accent)}
.tagline{font-size:12px;color:var(--text3);font-weight:400;letter-spacing:0.2px}
.user-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2)}

/* ── Layout ── */
.container{max-width:820px;margin:0 auto;padding:24px 16px}

/* ── Section label ── */
.slabel{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}

/* ── Week grid ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:32px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 6px 8px;cursor:pointer;transition:all .18s ease;text-align:center;user-select:none}
.day-card:hover:not(.rest){border-color:var(--accent);background:var(--bg3)}
.day-card.active{background:var(--accent-dim);border-color:var(--accent);box-shadow:0 0 18px var(--accent-glow)}
.day-card.rest{opacity:0.4;cursor:default;pointer-events:none}
.day-card.today .dname{color:var(--accent)}
.dname{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.dtype{font-size:8px;font-weight:600;color:var(--text3);line-height:1.4}
.day-card:not(.rest) .dtype{color:var(--accent)}
.ddot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin:5px auto 0}
.day-card.rest .ddot{display:none}

/* ── Day detail ── */
.day-detail{animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px}
.detail-title{font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
.detail-focus{font-size:13px;color:var(--text2);margin-top:3px;font-weight:400}
.time-badge{background:var(--accent-dim);border:1px solid rgba(59,130,246,.3);color:var(--accent);padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}

/* ── Progress ── */
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:20px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:12px;font-weight:600;color:var(--text2)}
.prog-count{font-size:12px;font-weight:800;color:var(--accent)}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);border-radius:2px;transition:width .4s ease}
.completion-msg{display:none;margin-top:10px;padding:10px 14px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:8px;color:var(--success);font-size:13px;font-weight:600;text-align:center}

/* ── Exercise cards ── */
.exercises-list{display:flex;flex-direction:column;gap:14px}
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s}
.ex-card.done{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.02)}
.ex-body{padding:18px}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.ex-name{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.2}
.ex-muscles{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.eq-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.eq-badge.machine{background:var(--purple-dim);border:1px solid rgba(167,139,250,.25);color:var(--purple)}
.eq-badge.dumbbell{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--warn)}

/* ── Exercise illustration (photo) ── */
.ex-illustration{width:100%;aspect-ratio:16/9;background:#070710;border-radius:10px;margin-bottom:14px;overflow:hidden;border:1px solid #1a1a28;line-height:0;position:relative}
.ex-illustration img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease}
.ex-card:hover .ex-illustration img{transform:scale(1.02)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat-pill{background:#0c0c14;border:1px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.stat-val{font-size:13px;font-weight:800;color:var(--text)}
.weight-row{font-size:12px;margin-bottom:12px}
.weight-row span:first-child{color:var(--text3)}
.weight-row span:last-child{color:var(--accent);font-weight:700;margin-left:6px}

/* ── Tip ── */
.tip-box{background:rgba(59,130,246,.05);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:14px}
.tip-lbl{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.8px;margin-bottom:3px}
.tip-text{font-size:12px;color:var(--text2);line-height:1.65}

/* ── Done checkbox ── */
.done-row{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border);cursor:pointer}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;background:transparent}
.chk.checked{background:var(--success);border-color:var(--success)}
.chk.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:800}
.done-lbl{font-size:12px;color:var(--text3);font-weight:500}
.ex-card.done .done-lbl{color:var(--success);text-decoration:line-through;opacity:.7}

/* ── Rest day ── */
.rest-view{text-align:center;padding:56px 24px}
.rest-emoji{font-size:52px;margin-bottom:16px}
.rest-title{font-size:20px;font-weight:800;margin-bottom:8px}
.rest-body{font-size:13px;color:var(--text2);line-height:1.7;max-width:300px;margin:0 auto}

/* ── Warm-Up & Cooldown ── */
.wc-section{margin-bottom:20px}
.wc-section.cooldown-section{margin-top:24px;margin-bottom:0}
.wc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.wc-icon{font-size:16px}
.wc-title{font-size:12px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase}
.warmup-section .wc-title{color:#f97316}
.cooldown-section .wc-title{color:#22d3ee}
.wc-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:7px}
.wc-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.wc-detail{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;letter-spacing:.3px}
.warmup-section .wc-detail{color:#f97316}
.cooldown-section .wc-detail{color:#22d3ee}
.wc-tip{font-size:12px;color:var(--text2);line-height:1.6;padding-left:10px;border-left:2px solid var(--border)}

/* ── Mobile ── */
@media(max-width:480px){
  .week-grid{gap:4px}
  .day-card{padding:7px 3px 6px;border-radius:9px}
  .dname{font-size:8px}
  .dtype{font-size:7px}
  .detail-title{font-size:18px}
  .ex-name{font-size:15px}
}
</style>
</head>

let selectedDay = null;
let progress = {}; // { dayKey: Set<exerciseId> }

function loadProgress() {
  try {
    const raw = localStorage.getItem("liftbud_progress");
    if (raw) {
      const parsed = JSON.parse(raw);
      for (const k in parsed) progress[k] = new Set(parsed[k]);
    }
  } catch(e) {}
}

function saveProgress() {
  try {
    const out = {};
    for (const k in progress) out[k] = [...progress[k]];
    localStorage.setItem("liftbud_progress", JSON.stringify(out));
  } catch(e) {}
}

function getProgress(dayKey) {
  return progress[dayKey] || (progress[dayKey] = new Set());
}

  const d = new Date().getDay(); // 0=Sun,1=Mon,...
  const map = [6,0,1,2,3,4,5];  // map to DAY_ORDER index
  return DAY_ORDER[map[d]];
}

/* ─────────────────────────────────────────────
   RENDER WEEK GRID
───────────────────────────────────────────── */
function renderWeek() {
  const todayKey = getTodayKey();
  const grid = document.getElementById("weekGrid");
  grid.innerHTML = "";
  DAY_ORDER.forEach((day, i) => {
    const w = WORKOUTS[day];
    const isRest = !w;
    const isToday = day === todayKey;
    const isActive = day === selectedDay;
    const div = document.createElement("div");
    div.className = ["day-card", isRest?"rest":"", isToday?"today":"", isActive?"active":""].filter(Boolean).join(" ");
    div.innerHTML = `<div class="dname">${DAY_SHORT[i]}</div>
      <div class="dtype">${isRest ? "Rest" : w.shortType}</div>
      <div class="ddot"></div>`;
    if (!isRest) div.onclick = () => selectDay(day);
    grid.appendChild(div);
  });
}

/* ─────────────────────────────────────────────
   SELECT DAY
───────────────────────────────────────────── */
function selectDay(day) {
  selectedDay = day;
  renderWeek();
  renderDayDetail();
}

/* ─────────────────────────────────────────────
   RENDER WARM-UP / COOLDOWN
───────────────────────────────────────────── */
function renderWarmupSection(items) {
  if (!items || !items.length) return "";
  return `<div class="wc-section warmup-section">
    <div class="wc-header"><span class="wc-icon">🔥</span><span class="wc-title">Warm-Up (5 min)</span></div>
    ${items.map(it => `<div class="wc-item">
      <div class="wc-name">${it.name}</div>
      <div class="wc-detail">${it.detail}</div>
      <div class="wc-tip">${it.tip}</div>
    </div>`).join("")}
  </div>`;
}

function renderCooldownSection(items) {
  if (!items || !items.length) return "";
  return `<div class="wc-section cooldown-section">
    <div class="wc-header"><span class="wc-icon">🧘</span><span class="wc-title">Cooldown Stretch</span></div>
    ${items.map(it => `<div class="wc-item">
      <div class="wc-name">${it.name}</div>
      <div class="wc-detail">${it.detail}</div>
      <div class="wc-tip">${it.tip}</div>
    </div>`).join("")}
  </div>`;
}

/* ─────────────────────────────────────────────
   RENDER DAY DETAIL
───────────────────────────────────────────── */
function renderDayDetail() {
  const container = document.getElementById("dayDetail");
  if (!selectedDay) { container.innerHTML = ""; return; }
  const w = WORKOUTS[selectedDay];
  if (!w) { renderRestDetail(container); return; }

  const done = getProgress(selectedDay);
  const total = w.exercises.length;
  const doneCount = done.size;
  const pct = total > 0 ? Math.round((doneCount/total)*100) : 0;

  container.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${w.title} — ${w.label}</div>
        <div class="detail-focus">${w.focus}</div>
      </div>
      <div class="time-badge">⏱ ${w.duration}</div>
    </div>
    ${renderWarmupSection(w.warmup)}
    <div class="progress-card">
      <div class="prog-row">
        <span class="prog-label">Session Progress</span>
        <span class="prog-count" id="progCount">${doneCount}/${total} exercises</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
      <div class="completion-msg" id="completionMsg">Great work, Lio! 💪 Rest up and come back stronger.</div>
    </div>
    <div class="exercises-list" id="exercisesList">
      ${w.exercises.map(ex => renderExercise(ex, done.has(ex.id))).join("")}
    </div>
    ${renderCooldownSection(w.cooldown)}
  `;

  if (doneCount === total && total > 0) {
    document.getElementById("completionMsg").style.display = "block";
  }

  // attach checkbox events
  container.querySelectorAll(".done-row").forEach(row => {
    row.addEventListener("click", () => {
      const exId = row.dataset.exid;
      const dayKey = row.dataset.day;
      toggleExercise(dayKey, exId);
    });
  });

  // scroll into view
  container.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ─────────────────────────────────────────────
   RENDER EXERCISE CARD
───────────────────────────────────────────── */
function renderExercise(ex, isDone) {
  const eqClass = ex.equipment === "machine" ? "machine" : "dumbbell";
  const eqLabel = ex.equipment === "machine" ? "⚙ Machine" : "🏋 Dumbbell";
  const imgUrl = IMGS[ex.svg] || "";

  return `
  <div class="ex-card${isDone?" done":""}" id="excard-${ex.id}">
    <div class="ex-body">
      <div class="ex-top">
        <div class="ex-name-wrap">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscles">${ex.muscles}</div>
        </div>
        <div class="eq-badge ${eqClass}">${eqLabel}</div>
      </div>
      <div class="ex-illustration"><img src="${imgUrl}" alt="${ex.name}" loading="lazy"></div>
      <div class="stats-grid">
        <div class="stat-pill"><div class="stat-lbl">Sets</div><div class="stat-val">${ex.sets}</div></div>
        <div class="stat-pill"><div class="stat-lbl">Reps</div><div class="stat-val">${ex.reps}</div></div>
        <div class="stat-pill"><div class="stat-lbl">Rest</div><div class="stat-val">${ex.rest}</div></div>
      </div>
      <div class="weight-row"><span>Suggested weight:</span><span>${ex.weight}</span></div>
      <div class="tip-box">
        <div class="tip-lbl">💡 COACH TIP</div>
        <div class="tip-text">${ex.tip}</div>
      </div>
      <div class="done-row" data-exid="${ex.id}" data-day="${selectedDay}">
        <div class="chk${isDone?" checked":""}" id="chk-${ex.id}"></div>
        <span class="done-lbl">${isDone ? "Done — great set!" : "Mark as done"}</span>
      </div>
    </div>
  </div>`;
}

/* ─────────────────────────────────────────────
   TOGGLE EXERCISE DONE
───────────────────────────────────────────── */
function toggleExercise(dayKey, exId) {
  const done = getProgress(dayKey);
  if (done.has(exId)) done.delete(exId); else done.add(exId);
  saveProgress();

  const w = WORKOUTS[dayKey];
  const total = w.exercises.length;
  const doneCount = done.size;
  const pct = total > 0 ? Math.round((doneCount/total)*100) : 0;

  // update progress bar + count
  const fill = document.getElementById("progFill");
  const count = document.getElementById("progCount");
  const msg = document.getElementById("completionMsg");
  if (fill) fill.style.width = pct + "%";
  if (count) count.textContent = `${doneCount}/${total} exercises`;
  if (msg) msg.style.display = (doneCount === total && total > 0) ? "block" : "none";

  // update card
  const card = document.getElementById(`excard-${exId}`);
  const chk = document.getElementById(`chk-${exId}`);
  const lbl = card?.querySelector(".done-lbl");
  const isDone = done.has(exId);
  if (card) card.classList.toggle("done", isDone);
  if (chk) chk.classList.toggle("checked", isDone);
  if (lbl) lbl.textContent = isDone ? "Done — great set!" : "Mark as done";
}

/* ─────────────────────────────────────────────
   REST DAY
───────────────────────────────────────────── */
function renderRestDetail(container) {
  container.innerHTML = `
    <div class="rest-view">
      <div class="rest-emoji">😴</div>
      <div class="rest-title">Rest & Recovery</div>
      <div class="rest-body">Your muscles grow while you rest, not while you train. Sleep well, eat enough protein, and get ready to crush the next session.</div>
    </div>`;
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
function init() {
  loadProgress();
  const todayKey = getTodayKey();
  // auto-select today if it's a workout day
  if (WORKOUTS[todayKey]) selectedDay = todayKey;
  renderWeek();
  if (selectedDay) renderDayDetail();
}

init();
</script>
</body>
</html>
